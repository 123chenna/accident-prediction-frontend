<!DOCTYPE html>
<html>
<head>
  <title>Accident Prediction</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;

      /* 🔥 BACKGROUND IMAGE */
      background: url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') no-repeat center center/cover;

      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 🔹 Dark overlay for better visibility */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      top: 0;
      left: 0;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.95);
      padding: 30px;
      border-radius: 16px;
      width: 350px;
      text-align: center;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }

    h2 {
      margin-bottom: 20px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #ff4d4d;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #cc0000;
    }

    #result {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="card">

  <h2>🚗 Accident Prediction</h2>

  <input id="speed" type="number" placeholder="Enter Speed (km/h)">

  <select id="weather">
    <option value="clear">Clear</option>
    <option value="rain">Rain</option>
    <option value="fog">Fog</option>
  </select>

  <select id="roadType">
    <option value="highway">Highway</option>
    <option value="city">City</option>
    <option value="rural">Rural</option>
  </select>

  <select id="traffic">
    <option value="low">Low</option>
    <option value="medium">Medium</option>
    <option value="high">High</option>
  </select>

  <select id="time">
    <option value="day">Day</option>
    <option value="night">Night</option>
    <option value="morning">Morning</option>
  </select>

  <button onclick="predict()">🚀 Predict Risk</button>

  <div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
