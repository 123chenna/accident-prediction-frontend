<!DOCTYPE html>
<html>
<head>
  <title>Accident Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f4f6f9;
      margin: 0;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
    }

    .logout-btn {
      background: #ff4d4d;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    /* RESULT CARD */
    .result-card {
      width: 60%;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    /* CHART GRID */
    .charts {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    canvas {
      height: 250px !important;
    }

    /* MOBILE */
    @media (max-width: 900px) {
      .charts {
        grid-template-columns: 1fr;
      }

      .result-card {
        width: 90%;
      }
    }
  </style>
</head>

<body>

<div class="header">
  <h2>🚗 Accident Prediction Dashboard</h2>
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<!-- 🔥 RESULT -->
<div class="result-card" id="riskText">Risk: --</div>

<!-- 📊 CHARTS -->
<div class="charts">

  <div class="card">
    <h3>Risk Distribution</h3>
    <canvas id="pieChart"></canvas>
  </div>

  <div class="card">
    <h3>Factors Impact</h3>
    <canvas id="barChart"></canvas>
  </div>

  <div class="card">
    <h3>Risk Trend</h3>
    <canvas id="lineChart"></canvas>
  </div>

</div>

<script>
// 🔥 GET DATA
const storedData = JSON.parse(localStorage.getItem("prediction"));

if (!storedData) {
  document.getElementById("riskText").innerText = "No Data Found";
}

// ✅ Prediction text
let prediction = storedData?.prediction || "LOW";

// Clean unwanted HTML
if (prediction.includes("<!DOCTYPE")) {
  prediction = "ERROR";
}

const riskText = document.getElementById("riskText");
riskText.innerText = "Risk: " + prediction;

// 🎨 Color + Probability
let probability = 0.2;

if (prediction.toLowerCase().includes("high")) {
  riskText.style.color = "red";
  probability = 0.8;
} else {
  riskText.style.color = "green";
}

// 🟢 PIE CHART (FIXED)
new Chart(document.getElementById("pieChart"), {
  type: "pie",
  data: {
    labels: ["High Risk", "Safe"],
    datasets: [{
      data: [probability * 100, (1 - probability) * 100],
      backgroundColor: ["#ff4d4d", "#4CAF50"]
    }]
  },
  options: {
    plugins: {
      legend: {
        position: "bottom"
      }
    }
  }
});

// 🔵 BAR CHART
new Chart(document.getElementById("barChart"), {
  type: "bar",
  data: {
    labels: ["Speed", "Traffic", "Weather", "Time"],
    datasets: [{
      label: "Impact Level",
      data: [80, 60, 70, 50],
      backgroundColor: "#3498db"
    }]
  }
});

// 🟣 LINE CHART
new Chart(document.getElementById("lineChart"), {
  type: "line",
  data: {
    labels: ["Day 1", "Day 2", "Day 3", "Day 4", "Day 5"],
    datasets: [{
      label: "Risk Trend",
      data: [20, 40, 30, 60, 50],
      borderColor: "#8e44ad",
      fill: false
    }]
  }
});

// 🔐 LOGOUT
function logout() {
  localStorage.removeItem("token");
  window.location.href = "index.html";
}
</script>

</body>
</html>
