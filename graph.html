<!DOCTYPE html>
<html>
<head>
  <title>Accident Dashboard</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f4f6f9;
      margin: 0;
    }

    /* 🔹 Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
    }

    h1 {
      margin: 0;
    }

    .logout-btn {
      padding: 10px 20px;
      background: #ff4d4d;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .logout-btn:hover {
      background: #cc0000;
    }

    /* 🔹 Container */
    .container {
      width: 90%;
      margin: auto;
    }

    /* 🔥 Charts Grid */
    .charts {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 20px;
    }

    /* 🔹 Cards */
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    canvas {
      max-width: 100%;
      height: 250px !important;
    }

    /* 📱 Responsive */
    @media (max-width: 900px) {
      .charts {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <!-- 🔹 Header -->
  <div class="header">
    <h1>🚗 Accident Prediction Dashboard</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <!-- 🔹 Charts -->
  <div class="container">
    <div class="charts">

      <div class="card">
        <h3>Risk Distribution</h3>
        <canvas id="pieChart"></canvas>
      </div>

      <div class="card">
        <h3>Factors Impact</h3>
        <canvas id="barChart"></canvas>
      </div>

      <div class="card">
        <h3>Risk Trend</h3>
        <canvas id="lineChart"></canvas>
      </div>

    </div>
  </div>

<script>
  // 🔥 Get prediction from localStorage
  const storedData = JSON.parse(localStorage.getItem("prediction"));
  const probability = storedData ? storedData.probability : 0.5;

  loadCharts();

  function loadCharts() {
    drawPieChart();
    drawBarChart();
    drawLineChart();
  }

  // 🟢 Pie Chart
  function drawPieChart() {
    new Chart(document.getElementById("pieChart"), {
      type: "pie",
      data: {
        labels: ["Accident Risk", "Safe"],
        datasets: [{
          data: [probability * 100, (1 - probability) * 100],
          backgroundColor: ["#ff4d4d", "#4CAF50"]
        }]
      }
    });
  }

  // 🔵 Bar Chart
  function drawBarChart() {
    new Chart(document.getElementById("barChart"), {
      type: "bar",
      data: {
        labels: ["Speed", "Traffic", "Weather", "Time"],
        datasets: [{
          label: "Impact Level",
          data: [80, 65, 70, 60],
          backgroundColor: "#3498db"
        }]
      }
    });
  }

  // 🟣 Line Chart
  function drawLineChart() {
    new Chart(document.getElementById("lineChart"), {
      type: "line",
      data: {
        labels: ["Day 1", "Day 2", "Day 3", "Day 4", "Day 5"],
        datasets: [{
          label: "Risk Trend",
          data: [30, 50, 40, 70, 60],
          borderColor: "#8e44ad",
          fill: false
        }]
      }
    });
  }

  // 🔐 Logout
  function logout() {
    localStorage.removeItem("token");
    window.location.href = "index.html";
  }
</script>

</body>
</html>
